services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_PROVIDER: ${GEMINI_PROVIDER:-api}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud_creds.json
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    volumes:
      - ./uploads:/app/uploads
      - ./apps/web/public/themes:/app/public/themes
      - melting_profile:/app/browser-profiles/melting
      - /home/server/.config/gcloud/application_default_credentials.json:/tmp/gcloud_creds.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: storyfit
      POSTGRES_USER: storyfit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyfit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal


volumes:
  pgdata:
  melting_profile:

networks:
  internal:
